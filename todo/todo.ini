[Rainmeter]
Update=-1
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=18,18,24,210
SkinWidth=420
LocalFont=#@#Fonts\MaterialIcons-Regular.ttf

[Metadata]
Name=TodoWidget
Author=Custom
Information=Todo list with sections, descriptions, and subitems
Version=1.0.0

[Variables]
FONT_FACE=Segoe UI
FONT_SIZE=13
DESC_FONT_SIZE=10
SUB_FONT_SIZE=11
SECTION_FONT_SIZE=16
ACTIVE_COLOR=220,225,230,255
COMPLETED_COLOR=140,145,155,120
DESC_COLOR=160,165,175,200
SECTION_COLOR=130,180,255,255
BUTTON_COLOR=180,185,195,220
BUTTON_SIZE=14
SUB_INDENT=30
EditIndex=0
EditDefault=
InputX=15
InputY=5

[MeasureTodoEngine]
Measure=Script
ScriptFile=#@#TodoEngine.lua
DataFile=#CURRENTPATH#data.txt
TrashFile=#CURRENTPATH#trash.txt
DynamicMeterFile=#@#DynamicMeters.inc
FONT_FACE=#FONT_FACE#
FONT_SIZE=#FONT_SIZE#
DESC_FONT_SIZE=#DESC_FONT_SIZE#
SUB_FONT_SIZE=#SUB_FONT_SIZE#
SECTION_FONT_SIZE=#SECTION_FONT_SIZE#
ACTIVE_COLOR=#ACTIVE_COLOR#
COMPLETED_COLOR=#COMPLETED_COLOR#
DESC_COLOR=#DESC_COLOR#
SECTION_COLOR=#SECTION_COLOR#
BUTTON_COLOR=#BUTTON_COLOR#
BUTTON_SIZE=#BUTTON_SIZE#
SUB_INDENT=#SUB_INDENT#
@Include=#@#DynamicMeters.inc

[MeasureInput]
Measure=Plugin
Plugin=InputText
SolidColor=35,35,45,240
FontColor=220,225,230,255
FontFace=#FONT_FACE#
FontSize=13
X=15
Y=5
H=28
W=300
DefaultValue=""
DynamicVariables=1
; Commands 1-2: Add new section
Command1=["$UserInput$"] X=#InputX# Y=#InputY# W=300 H=28 DefaultValue=""
Command2=[!CommandMeasure "MeasureTodoEngine" "AddSection('[MeasureInput]')"] [!Refresh] [!Refresh]
; Commands 3-4: Edit section label (uses EditIndex)
Command3=["$UserInput$"] X=#InputX# Y=#InputY# W=300 H=28 DefaultValue="#EditDefault#"
Command4=[!CommandMeasure "MeasureTodoEngine" "EditSection(#EditIndex#, '[MeasureInput]')"] [!Refresh] [!Refresh]
; Commands 5-6: Insert task into section (uses EditIndex)
Command5=["$UserInput$"] X=#InputX# Y=#InputY# W=300 H=28 DefaultValue=""
Command6=[!CommandMeasure "MeasureTodoEngine" "InsertTaskAfterSection(#EditIndex#, '[MeasureInput]')"] [!Refresh] [!Refresh]
; Commands 7-8: Insert subitem under task (uses EditIndex)
Command7=["$UserInput$"] X=#InputX# Y=#InputY# W=300 H=28 DefaultValue=""
Command8=[!CommandMeasure "MeasureTodoEngine" "InsertSubitemAfterTask(#EditIndex#, '[MeasureInput]')"] [!Refresh] [!Refresh]
; Commands 9-10: Edit description (uses EditIndex, EditDefault)
Command9=["$UserInput$"] X=5 Y=#InputY# W=410 H=100 DefaultValue="#EditDefault#"
Command10=[!CommandMeasure "MeasureTodoEngine" "EditDescription(#EditIndex#, '[MeasureInput]')"] [!Refresh] [!Refresh]

[DummyMeter]
Meter=String
